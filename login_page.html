<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="login_page-style.css">
    </head>
    <body>
        <div class="login-panel">
            <div class="side-image">
            </div>
            <div class="login-form">
                <div class="main-text">Вход в хранилище</div>
                <div class="extra-text">Авторизируйтесь, чтобы продолжить</div>
                <form action = "main_page.html" method="get">
                    <label for = "pole1" class = "input-title">Ваш логин</label>
                    <input type="text" class="form-input" placeholder="Введите ваш логин..." id = "pole1" required>
                    <label for = "pole2" class = "input-title">Ваша почта</label>
                    <input type="email" class="form-input" placeholder="Введите вашу электронную почту..." id = "pole2" required>
                    <label for = "pole3" class = "input-title">Ваш пароль</label>
                    <div class="password-row">
                        <div></div>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>
                    <input type="password" class="form-input" placeholder="Введите пароль..." id = "pole3" required>
                    <div class="checkbox-container">
                        <input type="checkbox" class="policy-checkbox" id="policy-check" required>
                        <label for="policy-check" class="checkbox-label">Согласен с политикой обработки персональных данных</label>
                    </div>
                    <button type = "submit" class = "login-button">Войти</button>
                    <div class="social-title">Используйте для входа</div>
                    <div class="social-icons">
                        <a href="#" class="social-icon"><i class='bx bxl-google'></i></a>
                        <a href="#" class="social-icon"><i class='bx bxl-telegram'></i></a>
                        <a href="#" class="social-icon"><i class='bx bxl-vk'></i></a>
                    </div>
                </form>
                <div class="back">
                    <a href="index.html">Назад</a>
                </div>
            </div>
        </div>
    </body>
</html>
